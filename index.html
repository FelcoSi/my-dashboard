<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix.S Data Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-black p-8 text-white">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-green-500">Live Dashboard Test</h1>
            <p id="lastUpdated" class="text-gray-400 text-sm">Last Updated: Loading...</p>
        </div>

        <div class="bg-gray-900 border border-green-500 p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold text-green-500 mb-4">Monthly Lead Trend</h2>
            <canvas id="myChart" height="100"></canvas>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------
        // 1. PASTE YOUR GOOGLE SHEETS CSV LINK HERE
        // ---------------------------------------------------------
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTW5YUr6FglX8RYqEwjc2Dl8PURA8Ej7eXsVD7l2Qg4UbTLuuh-Hc13kiVQKxWECoF48-JLhWcChHYM/pub?output=csv';

        // ---------------------------------------------------------
        // 2. SET YOUR REFRESH TIMES (Use 24-hour military time)
        // 7:30am, 10am, 12pm, 1pm, 2pm, 4pm, 8pm, 12am
        // ---------------------------------------------------------
        const refreshTimes = ["07:30", "10:00", "12:00", "13:00", "14:00", "16:00", "20:00", "00:00"];

        // Chart setup variables
        Chart.defaults.color = '#9ca3af';
        let myChart; // We store the chart here so we can update it later

        // Function to fetch data and draw/update the chart
        async function fetchAndUpdateData() {
            try {
                // Fetch the CSV data from Google Sheets
                const response = await fetch(csvUrl);
                const dataText = await response.text();

                // Process the CSV text into arrays
                const rows = dataText.split('\n').slice(1); // Skip the header row
                const months = [];
                const leads = [];

                rows.forEach(row => {
                    const columns = row.split(',');
                    if (columns.length >= 2) {
                        months.push(columns[0].trim());
                        leads.push(parseFloat(columns[1].trim()));
                    }
                });

                // Update the "Last Updated" text on the screen
                const now = new Date();
                document.getElementById('lastUpdated').innerText = 'Last Updated: ' + now.toLocaleTimeString();

                // If the chart exists, update it. If not, create it!
                if (myChart) {
                    myChart.data.labels = months;
                    myChart.data.datasets[0].data = leads;
                    myChart.update(); // Smoothly animates the new data
                } else {
                    const ctx = document.getElementById('myChart').getContext('2d');
                    myChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: months,
                            datasets: [{
                                label: 'New Leads',
                                data: leads,
                                backgroundColor: 'rgba(34, 197, 94, 0.5)',
                                borderColor: 'rgb(34, 197, 94)',
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true, grid: { color: '#374151' } },
                                x: { grid: { color: '#374151' } }
                            }
                        }
                    });
                }
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // Function to check the clock and trigger the refresh
        function checkSchedule() {
            const now = new Date();
            // Format current time to HH:MM (e.g., "07:30" or "14:00")
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const currentTime = `${hours}:${minutes}`;

            // If the current time exactly matches one in your list, update the data!
            if (refreshTimes.includes(currentTime)) {
                console.log("Scheduled refresh triggered at " + currentTime);
                fetchAndUpdateData();
            }
        }

        // 1. Run immediately when the page first loads
        fetchAndUpdateData();

        // 2. Start the timer! Check the clock every 60 seconds (60000 milliseconds)
        setInterval(checkSchedule, 60000);

    </script>
</body>
</html>
