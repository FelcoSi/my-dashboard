<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free Dashboard - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-black p-8 text-white">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-green-500 mb-6">Performance Dashboard</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-900 border border-green-500 p-6 rounded-lg shadow-lg">
                <h3 class="text-gray-400 text-sm font-semibold">Total Leads</h3>
                <p class="text-3xl font-bold text-green-400">1,379</p>
            </div>
            <div class="bg-gray-900 border border-green-500 p-6 rounded-lg shadow-lg">
                <h3 class="text-gray-400 text-sm font-semibold">March Volume</h3>
                <p class="text-3xl font-bold text-green-400">56</p>
            </div>
            <div class="bg-gray-900 border border-green-500 p-6 rounded-lg shadow-lg">
                <h3 class="text-gray-400 text-sm font-semibold">Top Location</h3>
                <p class="text-3xl font-bold text-green-400">Loganville</p>
            </div>
        </div>

        <div class="bg-gray-900 border border-green-500 p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold text-green-500 mb-4">Monthly Lead Trend</h2>
            <canvas id="myChart" height="100"></canvas>
        </div>
    </div>

    <script>
        // Make the default chart text light gray so we can read it on a dark background
        Chart.defaults.color = '#9ca3af';

        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar', 
            data: {
                labels: ['January', 'February', 'March', 'April', 'May'],
                datasets: [{
                    label: 'New Leads',
                    data: [65, 120, 56, 0, 0],
                    backgroundColor: 'rgba(34, 197, 94, 0.5)', // Transparent Green
                    borderColor: 'rgb(34, 197, 94)', // Solid Green
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { 
                        beginAtZero: true,
                        grid: { color: '#374151' } // Dark gray grid lines
                    },
                    x: {
                        grid: { color: '#374151' } // Dark gray grid lines
                    }
                }
            }
        });
    </script>
</body>
</html>
